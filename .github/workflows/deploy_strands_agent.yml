name: Deploy Strands Agent

on:
  push:
    branches: [main]
    paths:
      - "strands_agent/**"
      - "terraform/agentcore/**"
      - ".github/workflows/deploy_strands_agent.yml"
  pull_request:
    branches: [main]
    paths:
      - "strands_agent/**"
      - "terraform/agentcore/**"
      - ".github/workflows/deploy_strands_agent.yml"

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: cybersecurity-reflection-agent
  TF_VERSION: "~1.9"

permissions:
  contents: read
  id-token: write

jobs:
  # ── PR: validate Terraform only ──────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/agentcore
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="image_tag=latest" -no-color

  # ── Main branch: build image → provision infra → deploy ──────────────────────
  deploy:
    name: Build & Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 1: provision ECR and IAM first (required before image push) ──────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/agentcore
        run: terraform init

      - name: Provision ECR & IAM
        working-directory: terraform/agentcore
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.agent \
            -target=aws_ecr_lifecycle_policy.agent \
            -target=aws_iam_role.agentcore \
            -target=aws_iam_role_policy.bedrock_invoke \
            -target=aws_iam_role_policy.ecr_pull \
            -target=aws_iam_role_policy.cloudwatch_logs \
            -var="image_tag=${{ env.IMAGE_TAG }}"

      # ── Step 2: build and push the agent image ────────────────────────────────
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -t $REGISTRY/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }} \
            -t $REGISTRY/${{ env.PROJECT_NAME }}:latest \
            strands_agent/
          docker push $REGISTRY/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }}
          docker push $REGISTRY/${{ env.PROJECT_NAME }}:latest

      # ── Step 3: create or update the AgentCore runtime via AWS CLI ──────────────
      - name: Upgrade AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: terraform/agentcore
        run: |
          echo "role_arn=$(terraform output -raw agentcore_role_arn)" >> $GITHUB_OUTPUT
          echo "ecr_url=$(terraform output -raw ecr_repository_url)"  >> $GITHUB_OUTPUT

      - name: Deploy AgentCore Runtime
        env:
          AGENT_NAME: ${{ env.PROJECT_NAME }}
          ROLE_ARN:   ${{ steps.tf-outputs.outputs.role_arn }}
          IMAGE_URI:  ${{ steps.tf-outputs.outputs.ecr_url }}:${{ env.IMAGE_TAG }}
        run: |
          set -x
          ARTIFACT=$(printf '{"containerConfiguration":{"containerUri":"%s"}}' "$IMAGE_URI")
          echo "Artifact: $ARTIFACT"
          echo "Role ARN: $ROLE_ARN"

          echo "--- Listing existing runtimes ---"
          aws bedrock-agentcore-control list-agent-runtimes \
            --region ${{ env.AWS_REGION }} || true

          RUNTIME_ID=$(aws bedrock-agentcore-control list-agent-runtimes \
            --region ${{ env.AWS_REGION }} \
            --query "agentRuntimeSummaries[?agentRuntimeName=='$AGENT_NAME'].agentRuntimeId | [0]" \
            --output text || echo "")

          echo "Existing runtime ID: '$RUNTIME_ID'"

          NETWORK_CONFIG='{"networkMode":"PublicIpEnabled"}'

          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            echo "Creating AgentCore runtime..."
            aws bedrock-agentcore-control create-agent-runtime \
              --agent-runtime-name "$AGENT_NAME" \
              --role-arn "$ROLE_ARN" \
              --agent-runtime-artifact "$ARTIFACT" \
              --network-configuration "$NETWORK_CONFIG" \
              --region ${{ env.AWS_REGION }}
          else
            echo "Updating AgentCore runtime $RUNTIME_ID..."
            aws bedrock-agentcore-control update-agent-runtime \
              --agent-runtime-id "$RUNTIME_ID" \
              --role-arn "$ROLE_ARN" \
              --agent-runtime-artifact "$ARTIFACT" \
              --network-configuration "$NETWORK_CONFIG" \
              --region ${{ env.AWS_REGION }}
          fi
